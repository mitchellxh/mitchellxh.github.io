<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f1" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#141414" />
    <meta name="description" content="Mitchell Horn — Data Systems & AI Engineer. Research data pipelines, HPC, and AI/LLM infrastructure." />
    <title>Mitchell Horn</title>
    <link rel="canonical" href="https://mitchellhorn.dev/" />

    <!-- Open Graph / social preview (rich card when the link is shared) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mitchell Horn" />
    <meta property="og:url" content="https://mitchellhorn.dev/" />
    <meta property="og:title" content="Mitchell Horn" />
    <meta property="og:description" content="Data Systems & AI Engineer — research data pipelines, HPC, and AI/LLM infrastructure." />
    <meta property="og:image" content="https://mitchellhorn.dev/logo512.png" />
    <meta property="og:image:alt" content="Mitchell Horn — { HRF } monogram" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Mitchell Horn" />
    <meta name="twitter:description" content="Data Systems & AI Engineer — research data pipelines, HPC, and AI/LLM infrastructure." />
    <meta name="twitter:image" content="https://mitchellhorn.dev/logo512.png" />
    <script>
      // Apply persisted theme before first paint (prevents flash of wrong theme).
      // Must run here, not in React, which mounts too late.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t) document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
