<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Mitchell Horn's personal website" />
    <title>Mitchell Horn</title>
    <script>
      // Apply persisted theme before first paint (prevents flash of wrong theme).
      // Must run here, not in React, which mounts too late.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t) document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
